<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Biodata</title>
</head>
<body>
    <center>
        <table border="1"  cellpadding="0 " cellspacing="0">
        <tr>
            <td height="60"  colspan="3"  bgcolor="yellow">
               <table border="1" cellpadding="0" cellspacing="0">
              </table> 
            </td>
        </tr>
         <tr>
            <td height="60"  colspan="3"  bgcolor="yellow">
               <table border="1" cellpadding="0" cellspacing="0">
                <td width="100" height="60"></td>
                <td width="100" height="60"></td>
                <td width="100" height="60"></td>
                <td width="100" height="60"></td>
                <td width="900" height="60" bgcolor="red"></td>
              </table> 
            </td>
        </tr>
        <tr>
            <td width="1000" height="200" bgcolor="red"></td>
        </tr>
        <tr>
            <td height="60"  colspan="3"  bgcolor="yellow">
               <table border="1" cellpadding="0" cellspacing="0">
                <td width="250" height="100"></td>
                <td width="250" height="100"></td>
                <td width="250" height="100"></td>
                <td width="250" height="100"></td>
              </table> 
            </td>
        </tr> 
        <tr>
            <td height="60"  colspan="3"  bgcolor="yellow">
               <table border="1" cellpadding="0" cellspacing="0">
                <td width="100" height="60" bgcolor="red"></td>
                <td width="250" height="100"></td>
                <td width="250" height="100"></td>
                <td width="250" height="100"></td>
                <td width="250" height="100"></td>
                <td width="100" height="60" bgcolor="red"></td>
              </table> 
            </td>
        </tr> 
    </center>
</body>
</html>
